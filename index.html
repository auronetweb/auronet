<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Details</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            color: #333;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        }
        .logo-container {
            position: relative;
            opacity: 0;
            animation: slideUp 4s ease-in-out forwards;
        }
        .details{
            padding-right: 20px;
            opacity: 0;
            transform: scale(0.9);
            animation: fadeIn 5s ease-in-out forwards 1.5s;
        }
        img {
            width: 100%;
            height: auto;
        }
        p {
            font-size: 16px;
            margin-bottom: 15px;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 10px;
            margin: 5px 0;
            border: none;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
        }
        .call { background: #4d4f55; }
        .email { background: #4d4f55; }
        .whatsapp { background: #4d4f55; }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            color: #555;
        }

        @keyframes slideUp {
            from {
                transform: translateY(100px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: scale(0.9);
            }
            to {
                opacity: 1;
                transform: scale(1);
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo-container">
            <img src="image/logo.jpg " alt="company logo">
        </div>

        <div class="details">
            <p>We specialize in CCTV installations, network solutions, and IT services, providing reliable security and technology solutions for businesses and homes.</p>
            <br>
            <p><b>Contact</b><br>+94 766 508 686</p>
            <p><b>Email</b><br>biz.auronet@outlook.com</p>
            <a href="tel:0766508686" class="btn call">Call Now</a>
            <a href="mailto:biz.auronet@outlook.com" class="btn email"> Email Us</a>
            <a href="https://wa.me/94766508686" class="btn whatsapp"> WhatsApp</a>
            <a href="https://auronetweb.github.io/auronet" class="#"> www.auronet.lk</a>


            <div class="footer">&copy; 2025 auronet. All rights reserved.</div>

        </div>
    </div>
</body>
</html>
